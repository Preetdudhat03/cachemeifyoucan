services:
  - type: web
    name: codeforge-options-analytics
    env: node
    buildCommand: npm install && npm run build && pip install -r requirements.txt
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://codeforge-options-analytics.onrender.com/api
      - key: PYTHON_VERSION
        value: 3.10.0
